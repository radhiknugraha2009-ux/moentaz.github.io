<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error | Moentaz ProVision</title>
  <link rel="icon" type="image/jpeg" href="Blue Y2K Creative Star Class Logo.jpg"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a0000, #3d0000, #1a0000);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      color: white; overflow: hidden;
    }
    /* Glitch scanlines */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
      );
    }
    .container {
      text-align: center; padding: 40px 24px;
      position: relative; z-index: 1; max-width: 600px;
    }
    .logo {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; border: 3px solid rgba(239,68,68,0.5);
      box-shadow: 0 0 40px rgba(239,68,68,0.6);
      margin-bottom: 24px;
      animation: shake 0.5s ease-in-out infinite;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-4px) rotate(-1deg); }
      75%      { transform: translateX(4px) rotate(1deg); }
    }
    .error-icon { font-size: 80px; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.1); }
    }
    .code {
      font-size: clamp(60px, 15vw, 120px); font-weight: 900; line-height: 1;
      color: #ef4444;
      text-shadow: 0 0 20px rgba(239,68,68,0.8), 0 0 40px rgba(239,68,68,0.4);
      animation: glitch 2s infinite;
    }
    @keyframes glitch {
      0%,90%,100% { text-shadow: 0 0 20px rgba(239,68,68,0.8); transform: none; }
      92%  { transform: translateX(-3px); text-shadow: 3px 0 #60a5fa, -3px 0 #f472b6; }
      94%  { transform: translateX(3px);  text-shadow: -3px 0 #60a5fa, 3px 0 #f472b6; }
      96%  { transform: none; }
    }
    .title { font-size: 24px; font-weight: 700; margin: 12px 0 8px; color: #fca5a5; }
    .desc  { font-size: 14px; opacity: 0.7; line-height: 1.7; margin-bottom: 28px; }
    .error-detail {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px; padding: 16px 20px; margin-bottom: 28px;
      font-family: monospace; font-size: 13px; color: #fca5a5; text-align: left;
    }
    .btn-wrap { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-home {
      padding: 12px 28px; background: #ef4444; color: white;
      text-decoration: none; border-radius: 50px; font-weight: 700; font-size: 14px;
      transition: all 0.3s; border: none; cursor: pointer;
    }
    .btn-home:hover { background: #dc2626; transform: translateY(-2px); }
    .btn-reload {
      padding: 12px 28px; background: transparent;
      border: 2px solid rgba(255,255,255,0.3); color: white;
      border-radius: 50px; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.3s;
    }
    .btn-reload:hover { background: rgba(255,255,255,0.1); }
    .brand { margin-top: 36px; font-size: 12px; opacity: 0.3; }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="container">
    <img src="Blue Y2K Creative Star Class Logo.jpg" alt="Logo" class="logo"/>
    <div class="error-icon">⚠️</div>
    <div class="code">ERROR</div>
    <h1 class="title">Terjadi Kesalahan</h1>
    <p class="desc">
      Website mengalami gangguan teknis yang tidak terduga.<br>
      Tim kami sudah diberitahu dan sedang menangani masalah ini.
    </p>
    <div class="error-detail">
      <div>Status: <span style="color:#ef4444;">500 Internal Server Error</span></div>
      <div>Waktu: <span id="err-time"></span></div>
      <div>Pesan: Unexpected error occurred. Please try again later.</div>
    </div>
    <div class="btn-wrap">
      <button class="btn-reload" onclick="location.reload()">🔄 Coba Lagi</button>
      <a href="index.html" class="btn-home">🏠 Kembali ke Beranda</a>
    </div>
    <p class="brand">Moentaz ProVision &copy; 2026</p>
  </div>
  <script>
    document.getElementById('err-time').textContent = new Date().toLocaleString('id-ID');
  </script>
</body>
</html>
